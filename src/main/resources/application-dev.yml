# ===================================================================
# OnTheWay — DEV profile (local development against MySQL)
# Flyway owns the schema; Hibernate only validates the mapping.
# ===================================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/onthewaydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:sqlpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway is the single source of truth for the schema.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  file:
    name: logs/OnTheWay.log
