# ===================================================================
# OnTheWay — common configuration (profile-independent)
# Active profile defaults to "dev"; override with SPRING_PROFILES_ACTIVE.
# Secrets are read from environment variables with safe local-dev fallbacks.
# ===================================================================
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: OnTheWay
  jpa:
    open-in-view: false
  jackson:
    serialization:
      INDENT_OUTPUT: true
  graphql:
    path: /graphql
    graphiql:
      enabled: ${GRAPHQL_GRAPHIQL_ENABLED:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  data:
    web:
      pageable:
        max-page-size: 100
    elasticsearch:
      # This service uses ElasticsearchOperations directly; no repository proxy is required.
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  error:
    include-message: always

# JWT — secret MUST be supplied via env in non-dev environments.
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789abcdef}
  accessTokenExpirationMs: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 minutes
  refreshTokenExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:1209600000} # 14 days

# Application-specific settings (CORS, security, ETA, payments, routing).
ontheway:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
  security:
    rate-limit:
      auth-requests-per-minute: ${AUTH_RATE_LIMIT:10}
  eta:
    scheduler-enabled: ${ETA_SCHEDULER_ENABLED:true}
    average-speed-kmph: ${ETA_AVERAGE_SPEED_KMPH:30}
    safety-buffer-mins: ${ETA_SAFETY_BUFFER_MINS:5}
    traffic-factor: ${ETA_TRAFFIC_FACTOR:0.25}          # fraction of travel time added as traffic uncertainty (window half-width)
    min-traffic-buffer-mins: ${ETA_MIN_TRAFFIC_BUFFER_MINS:3}
  payment:
    provider: ${PAYMENT_PROVIDER:mock}   # mock | stripe | razorpay
    stripe:
      apikey: ${STRIPE_API_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    razorpay:
      apikey: ${RAZORPAY_API_KEY:}
      apisecret: ${RAZORPAY_API_SECRET:}
  route:
    provider: ${ROUTE_PROVIDER:mock}     # included adapter: mock (Haversine)
  messaging:
    kafka:
      enabled: ${KAFKA_ENABLED:false}
      topic: ${KAFKA_ORDER_TOPIC:ontheway.order-events}
  search:
    elasticsearch:
      enabled: ${ELASTICSEARCH_ENABLED:false}
  # Bootstrap the first administrator on a fresh durable DB (dev/prod). Nothing is created
  # unless both an email and a password are supplied; the demo profile seeds its own admin.
  bootstrap:
    admin-email: ${ONTHEWAY_ADMIN_EMAIL:}
    admin-password: ${ONTHEWAY_ADMIN_PASSWORD:}
    admin-name: ${ONTHEWAY_ADMIN_NAME:Administrator}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

management:
  health:
    elasticsearch:
      enabled: ${ELASTICSEARCH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.ontheway: ${LOG_LEVEL_APP:DEBUG}
