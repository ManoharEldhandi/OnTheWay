# ===================================================================
# OnTheWay — PROD profile (strict; everything from environment)
# No secrets or hosts are hardcoded. The app fails fast if env is missing.
# ===================================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
  jpa:
    hibernate:
      # Flyway is the single source of truth for the schema.
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET}

ontheway:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  payment:
    provider: ${PAYMENT_PROVIDER}

server:
  error:
    include-message: never

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    root: WARN
    com.ontheway: INFO
