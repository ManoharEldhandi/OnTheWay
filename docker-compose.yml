# OnTheWay — full stack (frontend + backend + MySQL) with one command:
#   docker compose up --build
#
# The backend runs the "dev" profile against MySQL and applies Flyway migrations
# on startup. The frontend is served by nginx and proxies /api to the backend, so
# the whole product is reachable at http://localhost:5173 on any machine with Docker.
# For a zero-database demo instead, run the app with the "demo" profile.

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: onthewaydb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sqlpassword}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-sqlpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ontheway-db:/var/lib/mysql

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://db:3306/onthewaydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-sqlpassword}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-string-0123456789}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      # First-run admin bootstrap (fresh MySQL has no seed data). Override in real deployments.
      ONTHEWAY_ADMIN_EMAIL: ${ONTHEWAY_ADMIN_EMAIL:-admin@ontheway.app}
      ONTHEWAY_ADMIN_PASSWORD: ${ONTHEWAY_ADMIN_PASSWORD:-change-me-admin}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ontheway-db:
