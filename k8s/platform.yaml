apiVersion: v1
kind: Namespace
metadata:
  name: ontheway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ontheway-config
  namespace: ontheway
data:
  SPRING_PROFILES_ACTIVE: prod
  DB_URL: jdbc:mysql://mysql:3306/onthewaydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  DB_USERNAME: root
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_ORDER_TOPIC: ontheway.order-events
  ELASTICSEARCH_ENABLED: "true"
  ELASTICSEARCH_URIS: http://elasticsearch:9200
  CORS_ALLOWED_ORIGINS: https://ontheway.example.com
  PAYMENT_PROVIDER: mock
  SWAGGER_ENABLED: "false"
  ONTHEWAY_ADMIN_NAME: Administrator
---
apiVersion: v1
kind: Secret
metadata:
  name: ontheway-secrets
  namespace: ontheway
type: Opaque
stringData:
  DB_PASSWORD: replace-before-deploy
  JWT_SECRET: replace-with-a-long-random-secret-before-deploy
  ONTHEWAY_ADMIN_EMAIL: admin@example.com
  ONTHEWAY_ADMIN_PASSWORD: replace-with-a-strong-admin-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ontheway
spec:
  replicas: 1
  selector:
    matchLabels: { app: mysql }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports: [{ containerPort: 3306 }]
          env:
            - { name: MYSQL_DATABASE, value: onthewaydb }
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: ontheway-secrets, key: DB_PASSWORD } }
          volumeMounts: [{ name: data, mountPath: /var/lib/mysql }]
          readinessProbe:
            exec: { command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -p$MYSQL_ROOT_PASSWORD"] }
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ontheway
spec:
  selector: { app: mysql }
  ports: [{ port: 3306, targetPort: 3306 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: ontheway
spec:
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports:
            - { name: broker, containerPort: 9092 }
            - { name: controller, containerPort: 9093 }
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "1" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: broker,controller }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: CONTROLLER }
            - { name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME, value: PLAINTEXT }
            - { name: ALLOW_PLAINTEXT_LISTENER, value: "yes" }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ontheway
spec:
  selector: { app: kafka }
  ports: [{ port: 9092, targetPort: broker }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: ontheway
spec:
  replicas: 1
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
          ports: [{ containerPort: 9200 }]
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 25
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: ontheway
spec:
  selector: { app: elasticsearch }
  ports: [{ port: 9200, targetPort: 9200 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ontheway
spec:
  # WebSocket sessions and the ETA scheduler are process-local. Keep one replica until
  # a shared WebSocket broker and distributed scheduler lock are configured.
  replicas: 1
  selector:
    matchLabels: { app: ontheway-backend }
  template:
    metadata:
      labels: { app: ontheway-backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/manohareldhandi/ontheway:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: ontheway-config }
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ontheway-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: ontheway-secrets, key: JWT_SECRET } }
            - name: ONTHEWAY_ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: ontheway-secrets, key: ONTHEWAY_ADMIN_EMAIL } }
            - name: ONTHEWAY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: ontheway-secrets, key: ONTHEWAY_ADMIN_PASSWORD } }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { cpu: "1", memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ontheway
spec:
  selector: { app: ontheway-backend }
  ports: [{ port: 8080, targetPort: 8080 }]
